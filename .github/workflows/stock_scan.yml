name: Daily Stock Scan

on:
  schedule:
    # 매일 오후 6시 (한국 시간 = UTC+9, UTC 기준 09:00)
    - cron: '0 9 * * MON-FRI'  # 평일만 실행
  workflow_dispatch:  # 수동 실행

permissions:
  contents: write  # backtest_data.json 커밋을 위해 필요

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy apscheduler beautifulsoup4 lxml pykrx

      - name: Run stock scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python auto_stock.py --test

      - name: Save backtest data to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backtest_data.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update backtest_data [skip ci]"
          git push

      - name: Log execution
        if: always()
        run: |
          echo "Stock scan executed at $(date)"
