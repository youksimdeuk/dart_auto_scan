name: Daily Stock Scan

on:
  schedule:
    # 매일 오후 4시 (한국 시간 = UTC+0 기준 07:00)
    - cron: '0 7 * * MON-FRI'  # 평일만 실행
  workflow_dispatch:  # 수동 실행

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy apscheduler beautifulsoup4 lxml
      
      - name: Run stock scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python auto_stock.py --test
      
      - name: Log execution
        if: always()
        run: |
          echo "Stock scan executed at $(date)"
